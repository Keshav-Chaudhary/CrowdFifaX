steps:
  # ── 1. Build the Docker image ──────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "--tag=gcr.io/$PROJECT_ID/crowdfifax:$COMMIT_SHA"
      - "--tag=gcr.io/$PROJECT_ID/crowdfifax:latest"
      # Inject secrets as build args (values come from Secret Manager via substitutions)
      - "--build-arg=GEMINI_API_KEY=${_GEMINI_API_KEY}"
      - "--build-arg=GEMINI_BASE_URL=${_GEMINI_BASE_URL}"
      - "--build-arg=GEMINI_MODEL=${_GEMINI_MODEL}"
      - "."

  # ── 2. Push the image to Artifact Registry / Container Registry ────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "gcr.io/$PROJECT_ID/crowdfifax:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "gcr.io/$PROJECT_ID/crowdfifax:latest"

  # ── 3. Deploy to Cloud Run ─────────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - crowdfifax
      - "--image=gcr.io/$PROJECT_ID/crowdfifax:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--set-env-vars=NODE_ENV=production"
      - "--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,GEMINI_MODEL=GEMINI_MODEL:latest"

# Substitution variables — set these in Cloud Build trigger config
substitutions:
  _GEMINI_API_KEY: ""   # Override in trigger
  _GEMINI_BASE_URL: "https://generativelanguage.googleapis.com/v1beta/openai/"
  _GEMINI_MODEL: "gemini-1.5-flash"

images:
  - "gcr.io/$PROJECT_ID/crowdfifax:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/crowdfifax:latest"

options:
  logging: CLOUD_LOGGING_ONLY
